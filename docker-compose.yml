# docker-compose.yml
services:
  frontend:
    build:
      context: ./frontend
    container_name: portfolio_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: portfolio_backend
    ports:
      - "8000:8000"
